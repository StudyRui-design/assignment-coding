<!DOCTYPE html>
<html>
<head lang="en">
    <meta charset="UTF-8">
    <title>邓睿的大数据应用课件管理系统</title>
    <link rel="stylesheet" href="css/public.css"/>
    <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<!--头部-->
<header class="publicHeader">
    <h1>邓睿的大数据应用课件管理系统</h1>

    <div class="publicHeaderR">
        <p><span>下午好！</span><span style="color: #fff21b"> Admin</span> , 欢迎你！</p>
        <a href="login.html">退出</a>
    </div>
</header>
<!--时间-->
<section class="publicTime">
    <span id="time">2015年1月1日 11:11  星期一</span>
    <a href="#">温馨提示：为了能正常浏览，请使用高版本浏览器！（IE10+）</a>
</section>
<!--主体内容-->
<section class="publicMian ">
    <div class="left">
        <h2 class="leftH2"><span class="span1"></span>功能列表 <span></span></h2>
        <nav>
            <ul class="list">
                <li ><a href="subjectList.html">科目管理</a></li>
                <li><a href="studyList.html">课件管理</a></li>
                <li><a href="userList.html">用户管理</a></li>
                <li><a href="password.html">密码修改</a></li>
                <li><a href="dashboard.html">数据可视化</a></li>
                <li><a href="sparkAnalytics.html">大数据分析平台</a></li>
                <li><a href="login.html">退出系统</a></li>
            </ul>
        </nav>
    </div>
    <div class="right">
        <div class="location">
            <strong>你现在所在的位置是:</strong>
            <span>科目管理页面 >> 科目修改页面</span>
        </div>
        <div class="providerAdd">
            <!-- 表单提交到科目修改Servlet，添加验证 -->
            <form action="/sft/subject/update" method="post" onsubmit="return checkForm()">
                <!-- 隐藏域存储科目ID，用于标识修改对象 -->
                <input type="hidden" name="id" id="subjectId" value=""/>
                <div>
                    <label for="subjectName">科目名称：</label>
                    <input type="text" name="name" id="subjectName"/>
                    <span id="nameTip" style="color: red; display: none;">*请输入科目名称</span>
                </div>
                <div>
                    <label for="status">科目状态：</label>
                    <select name="status" id="status">
                        <option value="正常">正常</option>
                        <option value="禁用">禁用</option>
                    </select>
                </div>
                <div class="providerAddBtn">
                    <input type="submit" value="更新"/>
                    <input type="button" value="返回" onclick="history.back(-1)"/>
                </div>
            </form>
        </div>
    </div>
</section>
<footer class="footer">
</footer>
<script src="js/time.js"></script>
<script>
    // 页面加载时获取URL参数并填充表单
    window.onload = function() {
        // 获取URL中的参数（示例：?id=1&name=Java&status=正常）
        const params = new URLSearchParams(window.location.search);
        document.getElementById("subjectId").value = params.get("id") || "";
        document.getElementById("subjectName").value = params.get("name") || "";
        document.getElementById("status").value = params.get("status") || "正常";
    }

    // 表单验证函数
    function checkForm() {
        let name = document.getElementById("subjectName").value.trim();
        let nameTip = document.getElementById("nameTip");
        if (name === "") {
            nameTip.style.display = "inline";
            return false; // 阻止表单提交
        } else {
            nameTip.style.display = "none";
            return true; // 允许表单提交
        }
    }
</script>
</body>
</html>
