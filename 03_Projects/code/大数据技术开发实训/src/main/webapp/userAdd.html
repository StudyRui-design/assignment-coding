<!DOCTYPE html>
<html>
<head lang="en">
    <meta charset="UTF-8">
    <title>邓睿的大数据应用课件管理系统</title>
    <link rel="stylesheet" href="css/public.css"/>
    <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<!--头部-->
<header class="publicHeader">
    <h1>邓睿的大数据应用课件管理系统</h1>

    <div class="publicHeaderR">
        <p><span>下午好！</span><span style="color: #fff21b"> Admin</span> , 欢迎你！</p>
        <a href="login.html">退出</a>
    </div>
</header>
<!--时间-->
<section class="publicTime">
    <span id="time">2015年1月1日 11:11  星期一</span>
    <a href="#">温馨提示：为了能正常浏览，请使用高版本浏览器！（IE10+）</a>
</section>
<!--主体内容-->
<section class="publicMian ">
    <div class="left">
        <h2 class="leftH2"><span class="span1"></span>功能列表 <span></span></h2>
        <nav>
            <ul class="list">
                 <li ><a href="subjectList.html">科目管理</a></li>
                <li><a href="studyList.html">课件管理</a></li>
                <li><a href="userList.html">用户管理</a></li>
                <li><a href="password.html">密码修改</a></li>
                <li><a href="dashboard.html">数据可视化</a></li>
                <li><a href="sparkAnalytics.html">大数据分析平台</a></li>
                <li><a href="login.html">退出系统</a></li>
            </ul>
        </nav>
    </div>
    <div class="right">
        <div class="location">
            <strong>你现在所在的位置是:</strong>
            <span>用户管理页面 >> 用户添加页面</span>
        </div>
        <div class="providerAdd">
            <form action="#" id="userForm">
                <!--div的class 为error是验证错误，ok是验证成功-->
                <div class="">
                    <label for="userId">用户账号：</label>
                    <input type="text" name="username" id="userId"/>
                    <span>*请输入用户账号，且不能重复</span>
                </div>
                <div>
                    <label for="userName">真实姓名：</label>
                    <input type="text" name="realName" id="userName"/>
                    <span >*请输入用真实姓名</span>
                </div>
                <div>
                    <label for="userpassword">用户密码：</label>
                    <input type="text" name="password" id="userpassword"/>
                    <span>*密码长度必须大于6位小于20位</span>

                </div>
                <div>
                    <label for="userRemi">确认密码：</label>
                    <input type="text" name="confirmPassword" id="userRemi"/>
                    <span>*请输入确认密码</span>
                </div>
                <div>
                    <label >用户性别：</label>
                    <select name="gender">
                        <option value="男">男</option>
                        <option value="女">女</option>
                    </select>
                    <span></span>
                </div>
                <div>
                    <label for="data">出生日期：</label>
                    <input type="text" name="birthday" id="data"/>
                    <span >*</span>
                </div>
                <div>
                    <label for="userphone">用户电话：</label>
                    <input type="text" name="phone" id="userphone"/>
                    <span >*</span>
                </div>
                <div>
                    <label for="userAddress">用户地址：</label>
                    <input type="text" name="address" id="userAddress"/>
                </div>
                <div>
                    <label >用户类别：</label>
                    <input type="radio" name="userType" value="学员" checked/>学员
                    <input type="radio" name="userType" value="老师"/>老师
                    <input type="radio" name="userType" value="管理员"/>管理员
                </div>
                <div class="providerAddBtn">
                    <input type="button" value="保存" id="saveBtn"/>
                    <input type="button" value="返回" onclick="window.location='userList.html'"/>
                </div>
            </form>
        </div>

    </div>
</section>
<footer class="footer">
</footer>
<script src="js/jquery.js"></script>
<script src="js/time.js"></script>
<script>
$(function() {
    $('#saveBtn').click(function() {
        var username = $('#userId').val().trim();
        var realName = $('#userName').val().trim();
        var password = $('#userpassword').val().trim();
        var confirmPassword = $('#userRemi').val().trim();
        var gender = $('select[name="gender"]').val();
        var birthday = $('#data').val().trim();
        var phone = $('#userphone').val().trim();
        var address = $('#userAddress').val().trim();
        var userType = $('input[name="userType"]:checked').val();

        if (!username) { alert('请输入用户账号'); return; }
        if (!realName) { alert('请输入真实姓名'); return; }
        if (!password) { alert('请输入密码'); return; }
        if (password.length < 6 || password.length > 20) { alert('密码长度必须大于6位小于20位'); return; }
        if (password !== confirmPassword) { alert('两次输入的密码不一致'); return; }
        // 校验生日格式
        if (birthday && !/^\d{4}-\d{2}-\d{2}$/.test(birthday)) {
            alert('出生日期格式应为 yyyy-MM-dd，如 2000-01-01');
            return;
        }

        $.post('/sft/user/add', {
            username: username,
            realName: realName,
            password: password,
            gender: gender || '',
            birthday: birthday || '',
            phone: phone || '',
            address: address || '',
            userType: userType || '学员'
        }, function(data) {
            document.write(data);
            document.close();
        });
    });
});
</script>

</body>
</html>
