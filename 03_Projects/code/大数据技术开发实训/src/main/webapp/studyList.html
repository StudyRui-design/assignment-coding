<!DOCTYPE html>
<html>
<head lang="en">
    <meta charset="UTF-8">
    <title>邓睿的大数据应用课件管理系统</title>
    <link rel="stylesheet" href="css/public.css"/>
    <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<!--头部-->
    <header class="publicHeader">
        <h1>邓睿的大数据应用课件管理系统</h1>
        <div class="publicHeaderR">
            <p><span>下午好！</span><span style="color: #fff21b"> Admin</span> , 欢迎你！</p>
            <a href="login.html">退出</a>
        </div>
    </header>
<!--时间-->
    <section class="publicTime">
        <span id="time">2015年1月1日 11:11  星期一</span>
        <a href="#">温馨提示：为了能正常浏览，请使用高版本浏览器！（IE10+）</a>
    </section>
<!--主体内容-->
    <section class="publicMian ">
        <div class="left">
            <h2 class="leftH2"><span class="span1"></span>功能列表 <span></span></h2>
            <nav>
                <ul class="list">
                <li ><a href="subjectList.html">科目管理</a></li>
                <li><a href="studyList.html">课件管理</a></li>
                <li><a href="userList.html">用户管理</a></li>
                <li><a href="password.html">密码修改</a></li>
                <li><a href="dashboard.html">数据可视化</a></li>
                <li><a href="sparkAnalytics.html">大数据分析平台</a></li>
                <li><a href="login.html">退出系统</a></li>
                </ul>
            </nav>
        </div>
        <div class="right">
            <div class="location">
                <strong>你现在所在的位置是:</strong>
                <span>课件管理页面</span>
            </div>
            <div class="search-bar">
                <form id="searchForm" style="display: inline-block;">
                    <label for="studyName" style="margin-right: 5px;">资源名：</label>
                    <input type="text" id="studyName" name="name" placeholder="请输入资源名"
                           style="vertical-align: middle; margin-right: 5px;"/>
                    <button type="button" onclick="searchStudy()"
                            style="vertical-align: middle; background-color: #5cb85c; color: #fff; border: none; padding: 5px 15px; border-radius: 3px; cursor: pointer;">
                        查询
                    </button>
                </form>
                <a href="studyAdd.html" style="float: right; margin-top: 5px;">
                    <button style="background-color: #50a1ff; color: #fff; border: none; padding: 5px 15px; border-radius: 3px; cursor: pointer;">
                        + 添加课件资源
                    </button>
                </a>
            </div>
            <table class="providerTable" cellpadding="0" cellspacing="0">
                <tr class="firstTr">
                    <th width="20%">文件名</th>
                    <th width="10%">科目</th>
                    <th width="20%">描述</th>
                    <th width="10%">上传日期</th>
                    <th width="10%">上传用户</th>
                    <th width="30%">操作</th>
                </tr>
                <tbody id="studyTableBody"></tbody>
            </table>
        </div>
    </section>

<!--点击删除按钮后弹出的页面-->
<div class="zhezhao"></div>
<div class="remove" id="removeUse">
    <div class="removerChid">
        <h2>提示</h2>
        <div class="removeMain">
            <p>你确定要删除该课件吗？</p>
            <a href="#" id="yes">确定</a>
            <a href="#" id="no">取消</a>
        </div>
    </div>
</div>

    <footer class="footer"></footer>

<script src="js/jquery.js"></script>
<script src="js/js.js"></script>
<script src="js/time.js"></script>
<script>
    // 页面加载完成后自动加载课件列表
    window.onload = function () {
        loadStudies();
    };

    // 加载课件列表
    function loadStudies(name) {
        name = name || "";
        $.ajax({
            url: "/sft/study/list",
            type: "GET",
            data: { name: name },
            dataType: "json",
            success: function (studies) {
                var tbody = document.getElementById("studyTableBody");
                tbody.innerHTML = "";
                if (!studies || studies.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">暂无课件数据</td></tr>';
                    return;
                }
                studies.forEach(function(s) {
                    var tr = document.createElement("tr");
                    tr.innerHTML =
                        '<td>' + (s.name || '') + '</td>' +
                        '<td>' + (s.subjectName || '') + '</td>' +
                        '<td>' + (s.description || '') + '</td>' +
                        '<td>' + (s.createTime || '') + '</td>' +
                        '<td>' + (s.creator || '') + '</td>' +
                        '<td>' +
                        '<a href="studyView.html?id=' + s.id + '"><img src="img/read.png" alt="查看" title="查看"/></a> ' +
                        '<a href="studyUpdate.html?id=' + s.id + '"><img src="img/xiugai.png" alt="修改" title="修改"/></a> ' +
                        '<a href="#" class="removeStudy" onclick="deleteStudy(' + s.id + ')"><img src="img/schu.png" alt="删除" title="删除"/></a>' +
                        '</td>';
                    tbody.appendChild(tr);
                });
            },
            error: function () {
                alert("加载课件列表失败，请重试");
            }
        });
    }

    // 搜索课件
    function searchStudy() {
        var name = document.getElementById("studyName").value;
        loadStudies(name);
    }

    // 删除课件
    function deleteStudy(id) {
        $('.zhezhao').show();
        $('#removeUse').show();

        $('#yes').off('click').on('click', function() {
            $.ajax({
                url: "/sft/study/delete",
                type: "GET",
                data: { id: id },
                success: function() {
                    $('.zhezhao').hide();
                    $('#removeUse').hide();
                    loadStudies();
                    alert("删除成功");
                },
                error: function() {
                    alert("删除失败，请重试");
                }
            });
            return false;
        });

        $('#no').off('click').on('click', function() {
            $('.zhezhao').hide();
            $('#removeUse').hide();
            return false;
        });
    }
</script>
</body>
</html>
