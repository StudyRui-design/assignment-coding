<!DOCTYPE html>
<html>
<head lang="en">
    <meta charset="UTF-8">
    <title>邓睿的大数据应用课件管理系统</title>
    <link rel="stylesheet" href="css/public.css"/>
    <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<!--头部-->
    <header class="publicHeader">
        <h1>邓睿的大数据应用课件管理系统</h1>
        <div class="publicHeaderR">
            <p><span>下午好！</span><span style="color: #fff21b"> Admin</span> , 欢迎你！</p>
            <a href="login.html">退出</a>
        </div>
    </header>
<!--时间-->
    <section class="publicTime">
        <span id="time">2015年1月1日 11:11  星期一</span>
        <a href="#">温馨提示：为了能正常浏览，请使用高版本浏览器！（IE10+）</a>
    </section>
<!--主体内容-->
    <section class="publicMian ">
        <div class="left">
            <h2 class="leftH2"><span class="span1"></span>功能列表 <span></span></h2>
            <nav>
                <ul class="list">
                    <li ><a href="subjectList.html">科目管理</a></li>
                    <li><a href="studyList.html">课件管理</a></li>
                    <li><a href="userList.html">用户管理</a></li>
                    <li><a href="password.html">密码修改</a></li>
                    <li><a href="dashboard.html">数据可视化</a></li>
                    <li><a href="sparkAnalytics.html">大数据分析平台</a></li>
                    <li><a href="login.html">退出系统</a></li>
                </ul>
            </nav>
        </div>
        <div class="right">
            <div class="location">
                <strong>你现在所在的位置是:</strong>
                <span>密码修改页面</span>
            </div>
            <div class="providerAdd">
                <form action="#">
                    <!--div的class 为error是验证错误，ok是验证成功-->
                    <div class="">
                        <label for="oldPassword">旧密码：</label>
                        <input type="password" name="oldPassword" id="oldPassword" required/>
                        <span>*请输入原密码</span>
                    </div>
                    <div>
                        <label for="newPassword">新密码：</label>
                        <input type="password" name="newPassword" id="newPassword" required/>
                        <span >*请输入新密码</span>
                    </div>
                    <div>
                        <label for="reNewPassword">确认新密码：</label>
                        <input type="password" name="reNewPassword" id="reNewPassword" required/>
                        <span >*请输入新确认密码，保证和新密码一致</span>
                    </div>
                    <div class="providerAddBtn">
                        <input type="button" value="保存" onclick="submitPassword()"/>
                    </div>
                </form>
            </div>
        </div>
    </section>
    <footer class="footer">
    </footer>
<script src="js/jquery.js"></script>
<script src="js/time.js"></script>
<script>
    function submitPassword() {
        var oldPwd = $('#oldPassword').val();
        var newPwd = $('#newPassword').val();
        var reNewPwd = $('#reNewPassword').val();

        if (!oldPwd || !newPwd || !reNewPwd) {
            alert('所有字段不能为空');
            return;
        }
        if (newPwd !== reNewPwd) {
            alert('两次输入的新密码不一致');
            return;
        }

        $.ajax({
            url: '/sft/user/changePassword',
            type: 'POST',
            data: { oldPassword: oldPwd, newPassword: newPwd },
            success: function(res) {
                var result = JSON.parse(res);
                if (result.success) {
                    alert(result.success);
                    window.location = 'login.html';
                } else {
                    alert(result.error || '修改失败');
                }
            },
            error: function() {
                alert('修改失败，请重试');
            }
        });
    }
</script>

</body>
</html>
