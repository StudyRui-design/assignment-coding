<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate"><meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0"></head>
<body>
<header class="publicHeader">
    <h1><a href="index.html">邓睿的大数据应用课件管理系统</a></h1>
    <div class="publicHeaderR">
        <p><span id="hours"></span><span style="color: #fff21b" id="showUser"> Admin</span> , 欢迎你！</p>
        <a href="login.html">退出</a>
    </div>
</header>
<section class="publicTime">
    <span id="time">2015年1月1日 11:11  星期一</span>
    <a href="#">温馨提示：为了能正常浏览，请使用高版本浏览器！（IE10+）</a>
</section>
<section class="publicMian ">
    <div class="left">
        <h2 class="leftH2"><span class="span1"></span>功能列表 <span></span></h2>
        <nav>
            <ul class="list">
                <li><a href="subjectList.html">科目管理</a></li>
                <li class="active"><a href="studyList.html">课件管理</a></li>
                <li><a href="userList.html">用户管理</a></li>
                <li><a href="password.html">密码修改</a></li>
                <li><a href="dashboard.html">数据可视化</a></li>
                <li><a href="bigData.html">大数据分析</a></li>
                <li><a href="machineLearning.html">智能推荐</a></li>
                <li><a href="aiChat.html">AI助手</a></li>
                <li><a href="login.html">退出系统</a></li>
            </ul>
        </nav>
    </div>
    <div class="right">
        <div class="location">
            <strong>你现在所在的位置是:</strong>
            <span>课件管理页面 >> 课件资源修改页面</span>
        </div>
        <div class="providerAdd">
            <form action="/sft/study/update" method="post">
                <input type="hidden" name="id" id="studyId"/>
                <div>
                    <label for="title">课件资源名：</label>
                    <input type="text" name="title" id="title" required/>
                    <span>*请输入课件资源名</span>
                </div>
                <div>
                    <label>所属科目：</label>
                    <select name="subjectId" id="subjectSelect">
                        <option value="">--请选择--</option>
                    </select>
                    <input type="hidden" name="subjectName" id="subjectName"/>
                    <span></span>
                </div>
                <div>
                    <label for="summary">课件简介：</label>
                    <textarea cols="80" rows="4" name="summary" id="summary"></textarea>
                </div>
                <div>
                    <label for="content">课件详情：</label>
                    <textarea cols="80" rows="12" name="content" id="content"></textarea>
                </div>
                <div>
                    <label for="fileSrc">课件附件：</label>
                    <input type="text" name="fileSrc" id="fileSrc" placeholder="附件路径"/>
                </div>
                <div class="providerAddBtn">
                    <input type="submit" value="保存"/>
                    <input type="button" value="返回" onclick="window.location='studyList.html'"/>
                </div>
            </form>
        </div>
    </div>
</section>
<footer class="footer"></footer>
<script src="js/jquery.js"></script>
<script src="js/time.js"></script><script src="js/user.js"></script>
<script>
$(function(){
// 从URL获取id
var params = new URLSearchParams(window.location.search);
var id = params.get("id");

// 加载科目下拉
$.getJSON("/sft/subject/list", function(result) {
    var sel = document.getElementById("subjectSelect");
    if(!sel) return;
    var subjects = (result && result.data && result.data.list) || [];
    subjects.forEach(function(s) {
        sel.innerHTML += '<option value="' + (s.id || '') + '">' + (s.name || '') + '</option>';
    });
    // 加载课件数据
    if (!id) return;
    $.getJSON("/sft/study/view?id=" + id, function(study) {
        var st = (study && study.data) || study || {};
        var e = function(id){ var el=document.getElementById(id); return el||{}; };
        var sidEl = document.getElementById("studyId"); if(sidEl) sidEl.value = st.id || '';
        var tEl = document.getElementById("title"); if(tEl) tEl.value = st.title || '';
        var sumEl = document.getElementById("summary"); if(sumEl) sumEl.value = st.summary || '';
        var cEl = document.getElementById("content"); if(cEl) cEl.value = st.content || '';
        var fEl = document.getElementById("fileSrc"); if(fEl) fEl.value = st.fileSrc || '';
        var snEl = document.getElementById("subjectName"); if(snEl) snEl.value = st.subjectName || '';
        if (st.subjectId) { var ssEl = document.getElementById("subjectSelect"); if(ssEl) ssEl.value = st.subjectId; }
    });
});

var sel = document.getElementById("subjectSelect");
if(sel) sel.onchange = function() {
    var sn = document.getElementById("subjectName");
    if(sn) sn.value = this.options[this.selectedIndex].text;
};
});
</script>
</body>
</html>
