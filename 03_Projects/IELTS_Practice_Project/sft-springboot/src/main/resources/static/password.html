        <div class="location">
            <strong>你现在所在的位置是:</strong>
            <span>密码修改页面</span>
        </div>
        <div class="providerAdd">
            <form id="pwdForm" action="javascript:void(0)">
                <div>
                    <label for="oldPassword">旧密码：</label>
                    <input type="password" name="oldPassword" id="oldPassword" required/>
                    <span>*请输入原密码</span>
                </div>
                <div>
                    <label for="newPassword">新密码：</label>
                    <input type="password" name="newPassword" id="newPassword" required minlength="6"/>
                    <span>*请输入新密码（不少于6位）</span>
                </div>
                <div>
                    <label for="reNewPassword">确认新密码：</label>
                    <input type="password" name="reNewPassword" id="reNewPassword" required minlength="6"/>
                    <span>*请再次输入新密码</span>
                </div>
                <div class="providerAddBtn">
                    <input type="submit" value="保存"/>
                </div>
            </form>
        </div>
    </div>
</section>
<footer class="footer"></footer>
<script src="js/time.js"></script><script src="js/user.js"></script><script src="js/jquery.js"></script>
<script>
$(function(){
var pf = document.getElementById('pwdForm');
if(!pf) return;
pf.addEventListener('submit', function(e) {
    e.preventDefault();
    var oEl = document.getElementById('oldPassword'), nEl = document.getElementById('newPassword'), rEl = document.getElementById('reNewPassword');
    var oldP = oEl ? oEl.value : '';
    var newP = nEl ? nEl.value : '';
    var reP = rEl ? rEl.value : '';
    if (!oldP || !newP || !reP) { alert('请填写完整信息'); return; }
    if (newP.length < 6) { alert('新密码不少于6位'); return; }
    if (newP !== reP) { alert('两次输入的新密码不一致'); return; }
    $.ajax({
        url: '/sft/auth/password',
        type: 'POST',
        contentType: 'application/json',
        data: JSON.stringify({oldPassword: oldP, newPassword: newP}),
        success: function(d) {
            alert(d.message || (d.code === 200 ? '修改成功' : '修改失败'));
        },
        error: function() { alert('请求失败，请检查网络'); }
    });
});
});
</script>
