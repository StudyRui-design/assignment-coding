<script src="js/jquery.js"></script>
<script src="js/time.js"></script><script src="js/user.js"></script>
<script>
$(function(){
var params = new URLSearchParams(window.location.search);
var id = params.get("id");
var vc = document.getElementById("viewContent");
if(!vc) return;
if (!id) { vc.innerHTML = '<p>参数错误</p>'; }
else $.getJSON("/sft/study/view?id=" + id, function(res) {
    var s = (res && res.data) || res || {};
    var html = '';
    html += '<p><strong>课件资源名：</strong>' + (s.title || '') + '</p>';
    html += '<p><strong>所属科目：</strong>' + (s.subjectName || '') + '</p>';
    html += '<p><strong>课件简介：</strong>' + (s.summary || '') + '</p>';
    html += '<p><strong>课件详情：</strong></p><div style="border:1px solid #ddd;padding:10px;">' + (s.content || '') + '</div>';
    html += '<p><strong>上传用户：</strong>' + (s.creator || '') + '</p>';
    html += '<p><strong>上传日期：</strong>' + (s.createTime || '') + '</p>';
    if (s.fileSrc) html += '<p><a href="' + s.fileSrc + '">下载课件附件</a></p>';
    html += '<br/><a href="studyList.html">返回</a>';
    vc.innerHTML = html;
});
});
</script>
